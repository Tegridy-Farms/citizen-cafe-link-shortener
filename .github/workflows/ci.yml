# Copy to: .github/workflows/ci.yml (Stage 1 scaffolding)
# Requires: package.json with "test" and "build" scripts.
#
# GitHub repo → Settings → Secrets and variables → Actions:
#   Add DATABASE_URL (Neon dev / pooled URI) so `next build` and any DB tests succeed in CI.
#   Vercel already has DATABASE_URL for deploys; CI is separate unless you mirror the same secret.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
